</script>
<style>
:root{
  --indigo:#1B2145;         /* deep indigo vat */
  --indigo-2:#232B57;       /* raised panel */
  --indigo-3:#2E3868;       /* hairlines on dark */
  --cotton:#F4EFE4;         /* raw cotton surface */
  --cotton-2:#EBE4D4;       /* card edge */
  --track:#E3DAC6;          /* undyed thread track */
  --madder:#C15B3C;         /* madder red dye */
  --turmeric:#DFA43A;       /* turmeric yellow dye */
  --teal:#2F7E6E;           /* indigo-green dye */
  --ink:#151A31;
  --ink-soft:#4C5170;
  --mute-d:#8A93BC;         /* muted on dark */
  --line-d:rgba(255,255,255,.10);
  --disp:'Fraunces',Georgia,serif;
  --body:'Instrument Sans',system-ui,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --shadow:0 18px 40px -22px rgba(9,12,30,.55);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--body);background:var(--indigo);color:var(--cotton);line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
.wrap{max-width:1240px;margin:0 auto;padding:0 28px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--turmeric);font-weight:500}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
h2.sec-title{font-family:var(--disp);font-weight:600;font-size:clamp(26px,3.4vw,40px);line-height:1.05;letter-spacing:-.01em;margin:.35rem 0 .2rem}

/* ---------- selvedge divider ---------- */
.selvedge{height:6px;width:100%;
  background:repeating-linear-gradient(90deg,var(--turmeric) 0 6px,transparent 6px 14px),
             repeating-linear-gradient(90deg,var(--madder) 0 2px,transparent 2px 14px);
  background-position:0 0,7px 0;opacity:.9}

/* ---------- top bar ---------- */
.topbar{position:sticky;top:0;z-index:50;background:rgba(20,25,48,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line-d)}
.topbar .row{display:flex;align-items:center;gap:20px;padding:12px 0}
.logo{display:flex;align-items:center;height:46px}
.logo img{height:100%;width:auto;display:block}
.logo.cutm{background:var(--cotton);border-radius:8px;padding:5px 11px;height:52px}
.logo.cutm img{height:100%}
.logo.dsf{background:#fff;border-radius:8px;padding:7px 12px;height:48px}
.topbar .mid{flex:1;min-width:0;text-align:center}
.topbar .mid .t{font-family:var(--disp);font-weight:600;font-size:18px;letter-spacing:-.01em;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .mid .s{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;color:var(--mute-d);text-transform:uppercase}
.navlinks{display:flex;gap:2px}
.navlinks a{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--mute-d);padding:7px 11px;border-radius:7px;transition:.2s}
.navlinks a:hover{color:#fff;background:var(--indigo-3)}

/* ---------- hero ---------- */
.hero{position:relative;padding:72px 0 64px;overflow:hidden}
.warp{position:absolute;inset:0;z-index:0;
  background:
    linear-gradient(180deg,rgba(27,33,69,.0) 0%,rgba(27,33,69,.55) 78%,var(--indigo) 100%),
    repeating-linear-gradient(90deg,rgba(223,164,58,.10) 0 1px,transparent 1px 9px),
    repeating-linear-gradient(90deg,rgba(193,91,60,.09) 0 1px,transparent 1px 15px),
    radial-gradient(120% 80% at 78% 8%,rgba(46,56,104,.9),transparent 60%);
  background-size:auto,10px 100%,15px 100%,auto;
  animation:drift 26s linear infinite}
@keyframes drift{to{background-position:0 0,140px 0,-140px 0,0 0}}
.hero .wrap{position:relative;z-index:1}
.hero h1{font-family:var(--disp);font-weight:900;font-size:clamp(52px,9vw,116px);line-height:.92;letter-spacing:-.03em;color:#fff;margin:.28em 0 .12em}
.hero h1 em{font-style:italic;font-weight:400;color:var(--turmeric)}
.hero .lede{font-size:clamp(16px,2vw,21px);max-width:60ch;color:#E4E0D2}
.hero .lede b{color:#fff;font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}
.chip{display:inline-flex;align-items:center;gap:9px;background:var(--indigo-2);border:1px solid var(--indigo-3);border-radius:999px;padding:7px 14px 7px 10px;font-size:13px}
.chip .dot{width:9px;height:9px;border-radius:50%}
.chip .mono{font-size:12px;color:var(--cotton)}

/* headline KPIs */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:40px}
.kpi{background:linear-gradient(180deg,var(--cotton),#EFE8D8);color:var(--ink);border-radius:16px;padding:20px 20px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px}
.kpi.k1::before{background:var(--madder)} .kpi.k2::before{background:var(--turmeric)}
.kpi.k3::before{background:var(--teal)} .kpi.k4::before{background:var(--indigo)}
.kpi .lab{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft)}
.kpi .val{font-family:var(--disp);font-weight:600;font-size:clamp(28px,3.6vw,42px);line-height:1;margin:8px 0 4px;letter-spacing:-.02em}
.kpi .sub{font-size:12.5px;color:var(--ink-soft)}

/* ---------- section shell ---------- */
section.band{padding:64px 0}
section.light{background:var(--cotton);color:var(--ink)}
section.light .eyebrow{color:var(--madder)}
section.light .sec-title{color:var(--ink)}
.sec-head{max-width:70ch;margin-bottom:30px}
.sec-head p{color:var(--ink-soft);font-size:15px;margin-top:6px}
section.band:not(.light) .sec-head p{color:var(--mute-d)}

/* ---------- finance ---------- */
.fin-grid{display:grid;grid-template-columns:1fr 1fr .9fr;gap:18px;align-items:stretch}
.fcard{background:#fff;border:1px solid var(--cotton-2);border-radius:16px;padding:22px;box-shadow:var(--shadow)}
.fcard h3{font-family:var(--disp);font-weight:600;font-size:19px;display:flex;align-items:center;gap:10px}
.fcard .tag{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:3px 8px;border-radius:6px;background:var(--track);color:var(--ink-soft)}
.stat-row{display:flex;gap:14px;margin:16px 0 6px;flex-wrap:wrap}
.stat{flex:1;min-width:88px}
.stat .n{font-family:var(--disp);font-weight:600;font-size:22px;letter-spacing:-.01em}
.stat .l{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft)}
.bar{height:12px;border-radius:7px;background:var(--track);overflow:hidden;position:relative;margin-top:12px}
.bar > i{display:block;height:100%;width:0;border-radius:7px;transition:width 1.3s cubic-bezier(.22,1,.36,1)}
.bar .thread{background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.18) 0 1px,transparent 1px 3px)}
.barcap{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-top:7px}
.donut-card{display:flex;flex-direction:column}
.donut-wrap{position:relative;flex:1;display:flex;align-items:center;justify-content:center;min-height:190px}
.donut-center{position:absolute;text-align:center;pointer-events:none}
.donut-center .big{font-family:var(--disp);font-weight:600;font-size:26px}
.donut-center .sm{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft)}
.legend{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.legend div{display:flex;align-items:center;gap:8px;font-size:13px}
.legend .sw{width:11px;height:11px;border-radius:3px}
.legend b{margin-left:auto;font-family:var(--mono);font-size:12.5px}
.recon{margin-top:18px;font-size:12.5px;color:var(--ink-soft);border-left:3px solid var(--turmeric);padding:8px 0 8px 14px;background:linear-gradient(90deg,rgba(223,164,58,.08),transparent)}

/* ---------- budget thread meters (signature) ---------- */
.meters{display:flex;flex-direction:column;gap:2px;margin-top:6px}
.meter{display:grid;grid-template-columns:230px 1fr 132px;gap:18px;align-items:center;padding:13px 0;border-bottom:1px solid var(--line-d)}
.meter .name{font-weight:600;font-size:14.5px}
.meter .name small{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;color:var(--mute-d);text-transform:uppercase;margin-top:2px}
.mtrack{position:relative;height:26px;border-radius:6px;background:var(--track);overflow:hidden;box-shadow:inset 0 0 0 1px rgba(0,0,0,.05)}
.mtrack .approved{position:absolute;inset:0;width:0;background:rgba(255,255,255,.55);transition:width 1.1s cubic-bezier(.22,1,.36,1)}
.mtrack .dyed{position:absolute;top:0;bottom:0;left:0;width:0;
  background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.16) 0 1px,transparent 1px 3px),var(--dye,var(--indigo));
  transition:width 1.4s cubic-bezier(.22,1,.36,1)}
.mtrack .dyed::after{content:"";position:absolute;top:0;bottom:0;right:-2px;width:20px;background:linear-gradient(90deg,transparent,var(--track))}
.meter .figs{text-align:right}
.meter .figs .sp{font-family:var(--disp);font-weight:600;font-size:16px}
.meter .figs .of{font-family:var(--mono);font-size:11px;color:var(--mute-d)}
.badge{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:999px;margin-top:5px}
.b-Delivered{background:rgba(52,64,138,.18);color:#C7CEF3}
.b-Completed{background:rgba(47,126,110,.22);color:#9BE0CE}
.b-In.progress,.b-Inprogress{background:rgba(223,164,58,.2);color:var(--turmeric)}
.b-Ongoing{background:rgba(138,147,188,.18);color:var(--mute-d)}
.b-Pending{background:rgba(255,255,255,.07);color:var(--mute-d)}
.meter-foot{display:flex;flex-wrap:wrap;gap:20px;margin-top:20px;font-family:var(--mono);font-size:11.5px;color:var(--mute-d)}
.meter-foot b{color:var(--cotton)}

/* ---------- procurement ---------- */
.inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.inv{background:#fff;border:1px solid var(--cotton-2);border-radius:14px;padding:18px;box-shadow:var(--shadow);position:relative}
.inv .rec{position:absolute;top:14px;right:14px;font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);background:rgba(47,126,110,.12);padding:3px 8px;border-radius:999px}
.inv .v{font-weight:600;font-size:15px;max-width:76%;line-height:1.25}
.inv .amt{font-family:var(--disp);font-weight:600;font-size:27px;margin:14px 0 2px;color:var(--ink)}
.inv .meta{font-family:var(--mono);font-size:11px;color:var(--ink-soft);display:grid;gap:2px;margin-top:8px}
.inv .meta span b{color:var(--ink);font-weight:600}
.proc-tot{display:flex;flex-wrap:wrap;align-items:center;gap:26px;margin-top:20px;background:var(--indigo-2);border:1px solid var(--indigo-3);border-radius:14px;padding:18px 22px}
.proc-tot .big{font-family:var(--disp);font-weight:600;font-size:30px;color:#fff}
.proc-tot .lab{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mute-d)}

/* ---------- roadmap ---------- */
.track-months{display:grid;grid-template-columns:repeat(12,1fr);gap:4px;margin:8px 0 4px}
.track-months .m{font-family:var(--mono);font-size:10px;text-align:center;color:var(--mute-d);padding:4px 0;border-top:1px solid var(--line-d);position:relative}
.track-months .m.now{color:var(--turmeric)}
.now-flag{position:relative;height:26px;margin-bottom:6px}
.now-flag .pin{position:absolute;top:0;transform:translateX(-50%);font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--indigo);background:var(--turmeric);padding:3px 9px;border-radius:999px;white-space:nowrap;font-weight:600}
.now-flag .pin::after{content:"";position:absolute;left:50%;top:100%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--turmeric)}
.phases{display:flex;flex-direction:column;gap:12px;margin-top:14px}
.phase{display:grid;grid-template-columns:22px 1fr;gap:16px}
.phase .num{font-family:var(--mono);font-size:12px;color:var(--mute-d);padding-top:2px}
.phase .body{border:1px solid var(--line-d);border-radius:14px;padding:16px 18px;background:var(--indigo-2);position:relative;overflow:hidden}
.phase .body::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--pc,var(--indigo-3))}
.phase h4{font-family:var(--disp);font-weight:600;font-size:18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.phase h4 .mspan{font-family:var(--mono);font-size:11px;color:var(--mute-d);font-weight:400}
.phase h4 .pstat{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:999px;margin-left:auto}
.ps-done{background:rgba(47,126,110,.22);color:#9BE0CE}
.ps-active{background:rgba(223,164,58,.2);color:var(--turmeric)}
.ps-next{background:rgba(255,255,255,.06);color:var(--mute-d)}
.tasks{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.tasks .tk{font-size:12.5px;background:var(--indigo);border:1px solid var(--indigo-3);border-radius:8px;padding:7px 11px;color:#D6D9EC}
.tasks .tk b{font-family:var(--mono);font-size:10.5px;color:var(--turmeric);margin-right:6px;letter-spacing:.05em}

/* ---------- impact ---------- */
.impact-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.stat-tile{background:#fff;border:1px solid var(--cotton-2);border-radius:14px;padding:20px;box-shadow:var(--shadow)}
.stat-tile .n{font-family:var(--disp);font-weight:600;font-size:clamp(30px,4vw,44px);line-height:1;color:var(--ink);letter-spacing:-.02em}
.stat-tile .n small{font-size:.5em;color:var(--madder);font-weight:600}
.stat-tile .l{font-size:13px;color:var(--ink-soft);margin-top:8px;font-weight:500}
.sdgs{display:flex;flex-wrap:wrap;gap:12px;margin-top:26px}
.sdg{display:flex;align-items:center;gap:12px;border-radius:12px;padding:12px 16px 12px 12px;color:#fff;min-width:210px;flex:1}
.sdg .no{font-family:var(--disp);font-weight:900;font-size:30px;line-height:1}
.sdg .tx{font-size:12.5px;font-weight:600;line-height:1.2}
.sdg .tx small{display:block;font-family:var(--mono);font-size:9.5px;font-weight:400;opacity:.85;letter-spacing:.06em;text-transform:uppercase;margin-top:3px}

/* ---------- engineering ---------- */
.eng-grid{display:grid;grid-template-columns:1.35fr 1fr;gap:20px;align-items:start}
.draw-card{background:#fff;border:1px solid var(--cotton-2);border-radius:16px;padding:16px;box-shadow:var(--shadow)}
.draw-card img{width:100%;display:block;border-radius:8px;border:1px solid var(--cotton-2)}
.draw-card .cap{font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-top:10px;letter-spacing:.02em}
.eng-side{display:flex;flex-direction:column;gap:16px}
.eng-card{background:var(--indigo-2);border:1px solid var(--indigo-3);border-radius:14px;padding:18px}
.eng-card h4{font-family:var(--disp);font-weight:600;font-size:17px;display:flex;align-items:center;gap:10px}
.eng-card h4 .st{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:999px;margin-left:auto}
.st-ong{background:rgba(223,164,58,.2);color:var(--turmeric)}
.st-act{background:rgba(47,126,110,.22);color:#9BE0CE}
.eng-card ul{list-style:none;margin-top:10px;display:flex;flex-direction:column;gap:7px}
.eng-card li{font-size:13px;color:#D6D9EC;padding-left:16px;position:relative}
.eng-card li::before{content:"";position:absolute;left:0;top:8px;width:6px;height:6px;border-radius:50%;background:var(--turmeric)}
.wb-specs{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:14px}
.wb-specs .sp{background:var(--indigo);border:1px solid var(--indigo-3);border-radius:9px;padding:9px 11px}
.wb-specs .sp .v{font-family:var(--disp);font-weight:600;font-size:17px}
.wb-specs .sp .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--mute-d);margin-top:2px}

/* ---------- footer ---------- */
footer{background:var(--indigo);border-top:1px solid var(--line-d);padding:44px 0 40px}
.foot-grid{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:28px}
.foot-grid h5{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--turmeric);margin-bottom:10px}
.foot-grid p{font-size:13px;color:#CFD3E6;margin-bottom:5px}
.foot-grid p b{color:#fff}
.foot-logos{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.foot-logos .logo.dsf{height:44px}
.foot-logos .logo.cutm{background:var(--cotton);border-radius:8px;padding:7px 13px;height:64px}
.foot-logos .logo.cutm img{height:100%}
.disclaimer{margin-top:26px;padding-top:18px;border-top:1px solid var(--line-d);font-size:11.5px;color:var(--mute-d);max-width:88ch}
.disclaimer b{color:#CFD3E6}

@media(max-width:1080px){
  .fin-grid{grid-template-columns:1fr 1fr}.donut-card{grid-column:span 2}
  .impact-grid{grid-template-columns:repeat(2,1fr)}
  .inv-grid{grid-template-columns:repeat(2,1fr)}
  .eng-grid{grid-template-columns:1fr}
  .navlinks{display:none}
}
@media(max-width:720px){
  .wrap{padding:0 18px}
  .kpis{grid-template-columns:1fr 1fr}
  .fin-grid,.impact-grid,.inv-grid{grid-template-columns:1fr}.donut-card{grid-column:auto}
  .meter{grid-template-columns:1fr;gap:8px}.meter .figs{text-align:left}
  .foot-grid{grid-template-columns:1fr}
  .track-months .m{font-size:8px}
  .logo.cutm img{height:40px}.topbar .mid .t{font-size:14px}
}
@media(prefers-reduced-motion:reduce){.warp{animation:none}*{transition:none!important}}
</style>
</head>
